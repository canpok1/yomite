services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    # FIXME: unhealthyとなってしまうため一旦コメントアウト
    # depends_on:
    #   ollama:
    #     condition: service_healthy

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  ollama-data:
